# Unity Edit Mode tests (game-ci). Requires UNITY_LICENSE, UNITY_EMAIL, UNITY_PASSWORD secrets.
# See docs/CI.md
# 디버깅: 저장소 Settings → Variables → ACTIONS_STEP_DEBUG = true (로그 상세)
name: Unity EditMode Tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# game-ci가 githubToken으로 Check Run을 올릴 때 기본 토큰에 checks: write가 없으면
# "Resource not accessible by integration" 이 납니다.
permissions:
  contents: read
  checks: write

jobs:
  editmode:
    name: EditMode
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Show Unity version from project (matches runner)
        run: grep m_EditorVersion ProjectSettings/ProjectVersion.txt || true

      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          # ProjectSettings/ProjectVersion.txt와 자동 일치 (워크플로 수정 빈도 감소)
          unityVersion: auto
          projectPath: .
          testMode: editmode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: test-results
          if-no-files-found: ignore
